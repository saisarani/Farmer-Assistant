name: csp1
description: Rythu Sahayak - Smart Farmer Assistant App for Andhra Pradesh
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  go_router: ^13.2.0

  flutter_riverpod: ^2.5.1

  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  firebase_core: ^2.30.1
  firebase_auth: ^4.19.5
  cloud_firestore: ^4.17.3
  firebase_messaging: ^14.9.2

  geolocator: ^11.0.0
  geocoding: ^3.0.0

  speech_to_text: ^6.6.2
  flutter_tts: ^4.0.2

  fl_chart: ^0.67.0

  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  flutter_dotenv: ^5.1.0

  cached_network_image: ^3.3.1

  intl: ^0.20.2

  cupertino_icons: ^1.0.6
  lottie: ^3.1.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.3.0

  permission_handler: ^11.3.1

  pdf: ^3.11.1
  printing: ^5.13.1

  intl_phone_field: ^3.2.0

  # ✅ Added inside dependencies
  google_fonts: ^6.1.0
  http: ^1.1.0
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env